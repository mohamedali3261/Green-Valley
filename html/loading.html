<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Green Valley </title>
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #2c5530 0%, #4a7c59 50%, #6fa86f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        /* حاوي التحميل الرئيسي */
        .loading-container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* شعار الشركة */
        .logo-container {
            margin-bottom: 40px;
            animation: logoGlow 2s ease-in-out infinite alternate;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #e8f5e8;
            font-weight: 500;
        }

        @keyframes logoGlow {
            0% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            }
            100% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            }
        }

        /* انيميشن التحميل */
        .loading-animation {
            margin: 40px 0;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            position: relative;
        }

        .spinner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* نص التحميل */
        .loading-text {
            font-size: 1.5rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* شريط التقدم */
        .progress-container {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fff 0%, #e8f5e8 100%);
            border-radius: 3px;
            animation: progress 3s ease-in-out infinite;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.4) 50%, transparent 100%);
            animation: shimmer 1.5s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }
            50% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* نص إضافي */
        .loading-subtitle {
            font-size: 1rem;
            color: #e8f5e8;
            margin-top: 30px;
            font-weight: 400;
        }

        /* أيقونات الفواكه والخضروات */
        .fruit-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .fruit-icon {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            animation: fruitFloat 8s ease-in-out infinite;
        }

        .fruit-icon:nth-child(1) {
            top: 15%;
            left: 15%;
            animation-delay: 0s;
        }

        .fruit-icon:nth-child(2) {
            top: 25%;
            right: 20%;
            animation-delay: 2s;
        }

        .fruit-icon:nth-child(3) {
            bottom: 20%;
            left: 25%;
            animation-delay: 4s;
        }

        .fruit-icon:nth-child(4) {
            bottom: 35%;
            right: 15%;
            animation-delay: 6s;
        }

        @keyframes fruitFloat {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.3;
            }
            25% {
                transform: translateY(-15px) rotate(90deg);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-25px) rotate(180deg);
                opacity: 0.3;
            }
            75% {
                transform: translateY(-15px) rotate(270deg);
                opacity: 0.5;
            }
        }

        /* تأثير الاختفاء */
        .fade-out {
            animation: fadeOut 0.5s ease-in-out forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.9);
            }
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1rem;
            }
            
            .loading-text {
                font-size: 1.3rem;
            }
            
            .progress-container {
                width: 250px;
            }
            
            .fruit-icon {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="background-animation">
        <div class="floating-element">🌿</div>
        <div class="floating-element">🍃</div>
        <div class="floating-element">🌱</div>
    </div>

    <!-- أيقونات الفواكه والخضروات -->
    <div class="fruit-icons">
        <div class="fruit-icon">🍎</div>
        <div class="fruit-icon">🥕</div>
        <div class="fruit-icon">🍊</div>
        <div class="fruit-icon">🥬</div>
    </div>

    <!-- حاوي التحميل الرئيسي -->
    <div class="loading-container" id="loadingContainer">
        <!-- شعار الشركة -->
        <div class="logo-container">
            <div class="logo">Green Valley Group</div>
            <div class="tagline">من المزرعة إلى المائدة</div>
        </div>

        <!-- انيميشن التحميل -->
        <div class="loading-animation">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">جاري التحميل...</div>
            
            <!-- شريط التقدم -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <div class="loading-subtitle">يرجى الانتظار بينما نحضر لك أفضل المنتجات الطازجة</div>
        </div>
    </div>

    <script>
        // نصوص التحميل المتغيرة
        const loadingTexts = [
            'جاري التحميل...',
            'نحضر لك أفضل المنتجات...',
            'جاري تحميل الصفحة...',
            'تقريباً انتهينا...'
        ];

        let textIndex = 0;
        const loadingTextElement = document.getElementById('loadingText');

        // تغيير نص التحميل كل ثانيتين
        setInterval(() => {
            textIndex = (textIndex + 1) % loadingTexts.length;
            loadingTextElement.textContent = loadingTexts[textIndex];
        }, 2000);

        // محاكاة التحميل والانتقال للصفحة الرئيسية
        window.addEventListener('load', () => {
            // انتظار 3 ثواني ثم الانتقال للصفحة الرئيسية
            setTimeout(() => {
                const container = document.getElementById('loadingContainer');
                container.classList.add('fade-out');
                
                // انتظار انتهاء انيميشن الاختفاء ثم الانتقال
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 500);
            }, 3000);
        });

        // في حالة الضغط على أي مكان، الانتقال مباشرة
        document.addEventListener('click', () => {
            window.location.href = 'home.html';
        });

        // في حالة الضغط على أي مفتاح، الانتقال مباشرة
        document.addEventListener('keypress', () => {
            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
